<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nova_ferre">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>Nova Ferre</title>
  <link rel="manifest" href="manifest.json">
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #2C3136;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      
      
      width: 450px; 
      max-width: 80vw; 
      height: auto;
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    /* Clases de utilidad del paquete */
    .stretch { display:block; width:100%; height:100%; }
    .cover { display:block; width:100%; height:100%; object-fit: cover; }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-4x.png" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-4x.png" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-4x.png" alt="Splash">
  </picture>
  
  <script src="flutter_bootstrap.js" async=""></script>
</body>
</html>
